name: iOS Build (No Signing)

# Trigger the workflow on push to any branch
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App (Unsigned)
    runs-on: macos-15  # macOS 15 with Xcode 16 (Swift 6 support)
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js 18.x
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.0'
          cache: 'npm'
      
      # Step 3: Install npm dependencies
      - name: Install npm dependencies
        run: |
          npm install --legacy-peer-deps --no-optional --ignore-scripts
      
      # Step 4: Rebuild native modules
      - name: Rebuild native modules
        run: |
          npm rebuild --legacy-peer-deps
      
      # Step 5: Verify react-native-svg scripts
      - name: Verify react-native-svg installation
        run: |
          if [ ! -f "node_modules/react-native-svg/scripts/rnsvg_utils.rb" ]; then
            echo "⚠️ react-native-svg scripts not found, reinstalling..."
            rm -rf node_modules/react-native-svg
            npm install react-native-svg --legacy-peer-deps
          fi
          ls -la node_modules/react-native-svg/scripts/ || echo "Scripts directory check"
      
      # Step 5: Clean CocoaPods cache
      - name: Clean old Podfile.lock and Pods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
      
      # Step 6: Install CocoaPods dependencies
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update --clean-install
      
      # Step 6: Build iOS app for Simulator (Optimized for Speed)
      - name: Build iOS App for Simulator
        run: |
          cd ios
          xcodebuild -workspace FLYKUP.xcworkspace \
            -scheme FLYKUP \
            -configuration Debug \
            -sdk iphonesimulator \
            -arch arm64 \
            -derivedDataPath ${{ github.workspace }}/ios/build \
            -parallelizeTargets \
            -jobs 4 \
            build
      
      # Step 7: Find and copy the built app
      - name: Locate and prepare build artifacts
        run: |
          cd ios/build/Build/Products/Debug-iphonesimulator
          ls -la
          mkdir -p ${{ github.workspace }}/artifacts
          cp -R FLYKUP.app ${{ github.workspace }}/artifacts/
          echo "Build artifacts prepared"
      
      # Step 8: Upload build artifacts
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ios-simulator-build-${{ github.run_number }}
          path: artifacts/FLYKUP.app
          retention-days: 7
      
      # Step 8: Upload build logs on failure
      - name: Upload Build Logs (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            ~/Library/Logs/gym
            ~/Library/Developer/Xcode/DerivedData/*/Logs
          retention-days: 3
      
      # Step 9: Build Summary
      - name: Build Summary
        if: success()
        run: |
          echo "✅ iOS build completed successfully!"
          echo "📦 Build artifacts are available in the Actions tab"
          echo "🔍 Archive location: build/FLYKUP.xcarchive"
