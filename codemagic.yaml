# ====================================================================
# CODEMAGIC CI/CD CONFIGURATION - SIMPLIFIED iOS BUILD
# ====================================================================
# Simple iOS build without signing - perfect for testing builds
# before pushing to App Store
# ====================================================================

workflows:
  # ====================================================================
  # iOS SIMPLE BUILD (NO SIGNING REQUIRED)
  # ====================================================================
  # Purpose: Quick build for testing - no certificates needed
  # Output: Unsigned iOS build
  # ====================================================================
  ios-simple-build:
    name: iOS Simple Build (No Signing)
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      vars:
        XCODE_WORKSPACE: "FLYKUP.xcworkspace"
        XCODE_SCHEME: "FLYKUP"
      xcode: 15.2
      node: 18.20.0
      cocoapods: default
      
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/ios/Pods
        
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
      cancel_previous_builds: true
      
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
          
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          
      - name: Build iOS (Archive without signing)
        script: |
          cd ios
          xcodebuild -workspace $XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Debug \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build/ios/FLYKUP.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean archive
            
    artifacts:
      - build/ios/**/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      
    publishing:
      email:
        recipients:
          - user@example.com # Replace with your email
        notify:
          success: true
          failure: true
